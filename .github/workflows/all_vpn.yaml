name: Etl on VPN Network

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1-5"

jobs:
  all:
    runs-on: ubuntu-latest

    env:
      VPN_URL: ${{ secrets.VPN_URL }}
      VPN_USER: ${{ secrets.VPN_USER }}
      VPN_PASSWORD: ${{ secrets.VPN_PASSWORD }}
      VPN_VERIFY_URL: ${{ secrets.VPN_VERIFY_URL }}
      VPN_SERVER_CERT_PIN: ${{ secrets.VPN_SERVER_CERT_PIN }}


    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: splormg/${{ github.event.repository.name }}:latest
          cache-from: type=registry,ref=splormg/${{ github.event.repository.name }}:latest
          cache-to: type=inline

      - name: Connect to VPN and verify
        id: vpn_connect
        continue-on-error: true
        run: |
          if [ -z "$VPN_URL" ] || [ -z "$VPN_USER" ] || [ -z "$VPN_PASSWORD" ] || [ -z "$VPN_VERIFY_URL" ]; then
            echo "Missing required VPN secrets. Please configure VPN_URL, VPN_USER, VPN_PASSWORD and VPN_VERIFY_URL."
            echo "connected=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gettext openconnect

          OPENCONNECT_ARGS=(--protocol=anyconnect --useragent 'AnyConnect' --user "$VPN_USER" --passwd-on-stdin --no-dtls)
          if [ -n "$VPN_SERVER_CERT_PIN" ]; then
            case "$VPN_SERVER_CERT_PIN" in
              pin-sha256:*) OPENCONNECT_SERVER_CERT="$VPN_SERVER_CERT_PIN" ;;
              sha256:*) OPENCONNECT_SERVER_CERT="pin-sha256:${VPN_SERVER_CERT_PIN#sha256:}" ;;
              *) OPENCONNECT_SERVER_CERT="pin-sha256:$VPN_SERVER_CERT_PIN" ;;
            esac
            OPENCONNECT_ARGS+=(--servercert "$OPENCONNECT_SERVER_CERT")
          else
            OPENCONNECT_ARGS+=(--no-cert-check)
          fi

          printf '%s\n' "$VPN_PASSWORD" | sudo openconnect "${OPENCONNECT_ARGS[@]}" "$VPN_URL" --background --script /etc/vpnc/vpnc-script
          sleep 20

          if curl -sSfL "$VPN_VERIFY_URL" >/dev/null 2>&1; then
            echo "connected=true" >> "$GITHUB_OUTPUT"
          else
            echo "connected=false" >> "$GITHUB_OUTPUT"
            echo "VPN connection verification failed. Check the VPN URL, credentials and VPN_VERIFY_URL."
          fi

      - name: Run ETL pipeline only after VPN is connected
        if: steps.vpn_connect.outputs.connected == 'true'
        run: |
          echo "VPN connected successfully. Starting the process..."
          docker run --rm --mount type=bind,source=${PWD},target=/project splormg/${{ github.event.repository.name }} make all

      - name: Publish data package
        run: |-
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          make publish
          make trigger
      - name: Workflow failure notification
        uses: JasonEtco/create-an-issue@v2
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        with:
          filename: .github/workflow-failure.md
